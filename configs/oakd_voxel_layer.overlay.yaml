# ──────────────────────────────────────────────────────────────────────────
# OAK-D depth point cloud → Nav2 costmap : ONLINE furniture detection (overlay)
#
# This is an OVERLAY, not a full params file. It is deep-merged into a COPY of
# the robot's real default nav2.yaml by scripts/nav/apply_furniture_costmap.py,
# which writes the launch-ready configs/nav2_furniture.yaml. Do NOT pass this
# file to Nav2 directly — the other Nav2 nodes would lose TurtleBot4's tuned
# values.
#
# Hybrid idea: tables + chairs are perceived LIVE.
#   - 2D lidar ("scan")      → marks furniture legs at scan height. Always works,
#                              no camera/Wi-Fi dependency (graceful degradation).
#   - OAK-D depth ("pcl")    → marks the table volume/overhang the flat lidar
#                              misses + moved chairs. Height-filtered so the
#                              floor is not marked.
#   - static map (walls)     → unchanged.
#
# The merge script substitutes __OAKD_POINTCLOUD_TOPIC__ with --pointcloud-topic
# (default /oakd/points). Confirm the real topic with `ros2 topic list`.
# ──────────────────────────────────────────────────────────────────────────

# ===== LOCAL costmap : reactive avoidance (voxel_layer) =====
local_costmap:
  local_costmap:
    ros__parameters:
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True            # visualize in RViz while tuning; set False for the run
        footprint_clearing_enabled: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16                        # hard max 16 (≈0.80 m vertical span at 0.05 m)
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1
        observation_sources: scan pcl
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          inf_is_valid: False
        pcl:
          topic: __OAKD_POINTCLOUD_TOPIC__
          data_type: "PointCloud2"
          marking: True
          clearing: True
          min_obstacle_height: 0.08          # reject floor returns
          max_obstacle_height: 0.90          # a bit above table height
          raytrace_max_range: 4.0            # OAK-D depth is short-range + forward FOV
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0            # conservative: avoid far-field depth noise
          obstacle_min_range: 0.20           # OAK-D depth blind zone is ~0.2 m
          inf_is_valid: False

# ===== GLOBAL costmap : planning around furniture (obstacle_layer) =====
global_costmap:
  global_costmap:
    ros__parameters:
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan pcl
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
          inf_is_valid: False
        pcl:
          topic: __OAKD_POINTCLOUD_TOPIC__
          data_type: "PointCloud2"
          marking: True
          clearing: True
          min_obstacle_height: 0.08
          max_obstacle_height: 0.90
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.20
          inf_is_valid: False
